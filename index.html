<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raj AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header>
    <div class="logo">🤖</div>
    <h1>Raj AI</h1>
    <p>Your Personal AI Assistant</p>
  </header>
<div id="status">
🟢 Raj AI Online
</div>
  <main id="chatBox">
<div class="ai-orb">
    <div class="ring"></div>
    <div class="core"></div>
</div>
    <div class="ai">
      👋 नमस्ते Rajpal!<br>
      मैं <b>Raj AI</b> हूँ। आपकी कैसे मदद कर सकता हूँ?
    </div>

  </main>

  <div class="input-area">
    <input
      type="text"
      id="userInput"
      placeholder="Type your message..."
    >
    <button id="sendBtn">➤</button>
  </div>
<button id="micBtn">🎤</button>
</div>

<script src="script.js"></script>

</body>
</html>
